<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="player">

        <label for="player-1">First Player</label>
        <input type="text" id="player-1" name="player-1">
        <label for="player-2">Second Player</label>
        <input type="text" id="player-2" name="player-2">
        <button class="start-btn">Start Game</button>

    </div>

     <div class="msg-container hide">
        <p id="msg"></p>
       
    </div>
    
 <button id="new-btn">New Game</button>
    <main>
        <h1>Tic Tac Toe</h1>
        <div class="container">
            <div class="game">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
        </div>
        <button id="reset">Reset Game</button>
    </main>

    <script src="script.js"></script>
</body>

</html>
